<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CheepTable — PDF Table OCR to Excel</title>
<meta name="description" content="Extract tables from Vietnamese PDF files directly in your browser. No upload, no server — AI-powered OCR converts construction BOQ and pricing tables to Excel.">
<meta name="keywords" content="PDF table extraction, Vietnamese OCR, BOQ, bảng giá, Excel, ONNX, browser OCR">
<meta name="author" content="CheepTable">
<link rel="canonical" href="https://nlqd.github.io/cheeptable/">

<!-- Open Graph / Facebook -->
<meta property="og:type" content="website">
<meta property="og:url" content="https://nlqd.github.io/cheeptable/">
<meta property="og:title" content="CheepTable — PDF Table OCR to Excel">
<meta property="og:description" content="Extract tables from Vietnamese PDF files directly in your browser. No upload, no server — AI-powered OCR converts construction BOQ and pricing tables to Excel.">

<!-- Twitter -->
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="CheepTable — PDF Table OCR to Excel">
<meta name="twitter:description" content="Extract tables from Vietnamese PDF files directly in your browser. No upload, no server — AI-powered OCR converts construction BOQ and pricing tables to Excel.">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/clipper-lib@6.4.2/clipper.js"></script>
<script async src="https://docs.opencv.org/4.x/opencv.js" onload="onOpenCvReady();" type="text/javascript"></script>

<script src="https://unpkg.com/tabulator-tables@6.3.1/dist/js/tabulator.min.js"></script>
<script src="vn_syllable_corrector.js"></script>

<style>
:root { --bg: #ffffff; --surface: #f8fafc; --border: #e2e8f0; --accent: #3b82f6; --accent2: #10b981; --text: #0f172a; --dim: #64748b; --warn: #f59e0b; }
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height:100vh; padding: 24px; }
h1 { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
.subtitle { color: var(--dim); font-size: 13px; margin-bottom: 24px; }

#dropzone {
  border: 2px dashed var(--border); border-radius: 12px; padding: 48px; text-align: center;
  cursor: pointer; transition: all 0.2s; position: relative; margin-bottom: 20px;
}
#dropzone:hover, #dropzone.dragover { border-color: var(--accent); background: rgba(59,130,246,0.05); }
#dropzone input { position:absolute; inset:0; opacity:0; cursor:pointer; }
#dropzone p { color: var(--dim); font-size: 14px; }
#dropzone p strong { color: var(--text); }

.log { font-size: 12px; color: var(--dim); max-height: 200px; overflow-y: auto; white-space: pre-wrap; line-height: 1.6; font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace; }
.log .ok { color: var(--accent2); }
.log .warn { color: var(--warn); }
.log .err { color: #ef4444; }

button { background: var(--accent); color: white; border: none; padding: 10px 24px; border-radius: 6px; font-family: inherit; font-size: 13px; cursor: pointer; font-weight: 600; }
button:hover { filter: brightness(1.1); }
button.secondary { background: var(--accent2); }
button:disabled { opacity: 0.4; cursor: not-allowed; }

.progress { height: 4px; background: var(--border); border-radius: 2px; margin: 16px 0; overflow: hidden; }
.progress-bar { height: 100%; background: var(--accent); transition: width 0.3s; border-radius: 2px; }

.hidden { display: none !important; }

/* ── Summary line ── */
#summaryLine { font-size: 14px; color: var(--text); margin-bottom: 12px; font-weight: 500; }

/* ── Issue Review ── */
#issueNav { display:flex; align-items:center; gap:8px; flex-wrap:wrap; padding:8px 12px; background:rgba(239,68,68,0.07); border:1px solid rgba(239,68,68,0.2); border-radius:6px; margin-bottom:12px; font-size:12px; }
#issueNav.no-issues { background:rgba(16,185,129,0.07); border-color:rgba(16,185,129,0.2); }
.fl-cnt { font-weight:700; color:var(--warn); font-size:14px; }
.fl-cnt.ok { color:var(--accent2); }

/* ── Download button ── */
#dlXlsx { font-size: 15px; padding: 12px 32px; margin-bottom: 16px; }

/* ── Tabulator overrides ── */
#tabulatorTable { margin-bottom: 16px; }
.tabulator .fl-badge { display:inline-flex; align-items:center; font-size:10px; padding:1px 4px; border-radius:3px; cursor:pointer; user-select:none; background:#fef3c7; color:#92400e; }
.tabulator .tabulator-row.section-row { background: rgba(59,130,246,0.12) !important; }
.tabulator .tabulator-row.section-row .tabulator-cell { font-weight: 600; color: var(--accent); }
.tabulator .tabulator-row.fl-active-row .tabulator-cell { box-shadow: inset 0 0 0 2px var(--accent) !important; }

/* ── Log panel ── */
#logPanel { margin-top: 16px; border: 1px solid var(--border); border-radius: 8px; padding: 8px 16px; background: var(--surface); }
#logPanel summary { cursor: pointer; font-size: 13px; font-weight: 500; color: var(--dim); padding: 4px 0; }
</style>
</head>
<body>

<h1>CheepTable</h1>
<p class="subtitle">Convert Vietnamese PDF tables to Excel</p>

<div id="dropzone">
  <input type="file" id="fileInput" accept=".pdf">
  <p><strong>Drop PDF here</strong> or click to browse</p>
  <div style="margin-top: 12px;">
    <button onclick="event.stopPropagation(); loadSamplePDF()" style="background: var(--accent2); padding: 8px 16px; font-size: 12px; position: relative; z-index: 2;">
      Try Sample PDF
    </button>
    <span style="font-size: 11px; color: var(--dim); margin-left: 8px;">Test with Vietnamese construction pricing table</span>
  </div>
</div>

<div id="progressPanel" class="hidden">
  <div class="progress"><div class="progress-bar" id="pbar" style="width:0%"></div></div>
  <div style="margin-top: 8px; text-align: center;">
    <button id="cancelBtn" onclick="cancelProcessing()" style="background: #ef4444; padding: 6px 16px; font-size: 12px;">
      Cancel Processing
    </button>
    <div id="progressText" style="font-size: 12px; color: var(--dim); margin-top: 4px;">Processing...</div>
  </div>
</div>

<div id="resultPanel" class="hidden">
  <div id="summaryLine"></div>
  <div id="issueNav" class="hidden"></div>
  <button id="dlXlsx" class="secondary" disabled>Download Excel (.xlsx)</button>
  <div id="tabulatorTable"></div>
</div>

<div id="logPanel" class="hidden">
  <details>
    <summary>Processing Log</summary>
    <div class="log" id="log"></div>
  </details>
</div>

<script src="boq-utils.js"></script>
<script src="boq-viet.js"></script>
<script src="boq-ocr.js"></script>
<script src="boq-onnx.js"></script>
<script src="boq-extract.js"></script>
<script src="boq-ui.js"></script>
<script src="boq-review.js"></script>
<script src="boq-export.js"></script>
<script>
// ── Config ──
const LINE_TOLERANCE = 3;
const MIN_LINE_LEN = 10;
const CELL_PAD = 1.5;
const OCR_SCALE = 200 / 72;
const CELL_MATCH_MARGIN_PX   = 30;
const ORPHAN_NEAREST_CELL_PX = 100;
const ROW_Y_THRESHOLD_PX     = 10;

pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// ── Perf stubs ──
const perfStart = () => {};
const perfEnd = () => {};

// ── Stubs for globals referenced by un-modified files (boq-extract.js, boq-ocr.js, boq-viet.js) ──
const OCR_SERVER_URL = '';
let ocrServerAvailable = false;
let vpsApiAvailable = false;
let diacriticCache = {};
let debugData = { ocrWords: [], ocrLines: [], pdfMetadata: null };
function authHeaders() { return {}; }
function clearAuthToken() {}

// ── State ──
let extractedRows = [];
let currentOCRPage = 0;
let totalPDFPages = 0;
let opencvReady = false;
let syllableCorrector = null;
let pdfDoc = null;

// ── Review / Flag State ──
let rowFlags    = {};
let flagList    = [];
let currFlagIdx = -1;

let processingCancelled = false;

// ── OpenCV.js Initialization ──
function onOpenCvReady() {
  if (typeof cv !== 'undefined') {
    if (typeof cv.imread === 'function') {
      opencvReady = true;
      log('OpenCV.js loaded', 'ok');
    } else {
      cv['onRuntimeInitialized'] = () => {
        opencvReady = true;
        log('OpenCV.js loaded', 'ok');
      };
    }
  }
}

let onnxBackendAvailable = null;

// ── Viz stub ──
function showVizPanel() {}

// ── UI Refs ──
const $ = id => document.getElementById(id);
const dropzone = $('dropzone');
const fileInput = $('fileInput');
const logEl = $('log');

// ── Logging ──
function log(msg, cls = '') {
  $('logPanel').classList.remove('hidden');
  const span = document.createElement('span');
  span.className = cls;
  span.textContent = msg + '\n';
  logEl.appendChild(span);
  logEl.scrollTop = logEl.scrollHeight;
}

// ── Sample PDF ──
async function loadSamplePDF() {
  log('Loading sample PDF...', 'ok');
  try {
    const response = await fetch('sample.pdf');
    if (!response.ok) {
      throw new Error('Sample PDF not found. Please upload your own PDF.');
    }
    const blob = await response.blob();
    const file = new File([blob], 'sample.pdf', { type: 'application/pdf' });
    await handleFile(file);
  } catch (err) {
    log('Error loading sample: ' + err.message, 'err');
    alert('Sample PDF not found.\n\nPlease upload your own PDF file.');
  }
}

// ── Cancel Processing ──
function cancelProcessing() {
  processingCancelled = true;
  log('Processing cancelled by user', 'warn');
  $('progressPanel').classList.add('hidden');
  $('pbar').style.width = '0%';
  alert('Processing cancelled.\n\nYou can upload a different file.');
}

// ── File Input ──
dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('dragover'); });
dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
dropzone.addEventListener('drop', e => { e.preventDefault(); dropzone.classList.remove('dragover'); handleFile(e.dataTransfer.files[0]); });
fileInput.addEventListener('change', e => handleFile(e.target.files[0]));

async function handleFile(file) {
  processingCancelled = false;

  if (!file) {
    log('No file selected', 'err');
    return;
  }

  if (!file.name.endsWith('.pdf')) {
    log('Error: Please select a PDF file', 'err');
    alert('This app only works with PDF files. Please select a .pdf file.');
    return;
  }

  const sizeMB = file.size / (1024 * 1024);
  if (sizeMB > 50) {
    log('Error: File too large (' + sizeMB.toFixed(1) + ' MB)', 'err');
    alert('File is too large (' + sizeMB.toFixed(1) + ' MB).\n\nMaximum file size: 50 MB');
    return;
  }

  if (sizeMB > 10) {
    log('Warning: Large file (' + sizeMB.toFixed(1) + ' MB) - processing may take several minutes', 'warn');
  }

  log('Loading: ' + file.name + ' (' + (file.size/1024).toFixed(0) + ' KB)');
  $('progressPanel').classList.remove('hidden');
  $('resultPanel').classList.add('hidden');

  try {
    const buf = await file.arrayBuffer();
    await extractPDF(buf);
  } catch (err) {
    if (processingCancelled) {
      log('Processing cancelled', 'warn');
      return;
    }
    log('Fatal error: ' + err.message, 'err');
    alert('Processing failed: ' + err.message + '\n\nPlease try:\n1. A smaller PDF file\n2. Refreshing the page\n3. Using a different browser');
    console.error(err);
    $('progressPanel').classList.add('hidden');
  }
}

// ── Core Pipeline ──
async function extractPDF(buffer) {
  const pdf = await pdfjsLib.getDocument({ data: buffer }).promise;
  pdfDoc = pdf;
  const numPages = pdf.numPages;
  totalPDFPages = numPages;
  log('PDF loaded: ' + numPages + ' pages', 'ok');

  let allTextItems = [];
  let allLines = [];
  let totalOps = 0;
  let allOcrWords = [];
  let allOcrLines = [];
  let allBorderCells = [];
  const pageCanvases = {};
  let ocrPageCount = 0;
  let totalConfidence = 0;
  let totalOcrWords = 0;

  // ── ETA tracking ──
  const pageTimings = [];

  for (let p = 1; p <= numPages; p++) {
    if (processingCancelled) {
      log('Processing cancelled', 'warn');
      $('progressPanel').classList.add('hidden');
      return;
    }

    const pageStartTime = performance.now();

    // ETA display
    if (pageTimings.length === 0) {
      $('progressText').textContent = 'Processing page ' + p + ' of ' + numPages + '...';
    } else {
      const avgMs = pageTimings.reduce((a, b) => a + b, 0) / pageTimings.length;
      const remainingPages = numPages - p + 1;
      const etaMs = avgMs * remainingPages;
      const etaStr = formatETA(etaMs);
      $('progressText').textContent = 'Page ' + p + '/' + numPages + ' — ~' + etaStr + ' remaining';
    }

    $('pbar').style.width = ((p - 1) / numPages * 85) + '%';

    const page = await pdf.getPage(p);
    const vp = page.getViewport({ scale: 1.0 });
    const pageH = vp.height;

    const tc = await page.getTextContent();
    const pageText = tc.items.filter(it => it.str.trim()).map(it => ({
      str: it.str,
      x: it.transform[4],
      y: pageH - it.transform[5],
      width: it.width,
      height: Math.abs(it.transform[3]) || Math.abs(it.transform[0]) || 10,
      page: p
    }));

    if (pageText.length > 0) {
      const opList = await page.getOperatorList();
      totalOps += opList.fnArray.length;
      const pageLines = extractLines(opList, pageH, p);
      log('  Page ' + p + ': ' + pageText.length + ' text spans, ' + pageLines.length + ' lines (native)');
      allTextItems.push(...pageText);
      allLines.push(...pageLines);
    } else {
      // Image-based page: ONNX OCR
      if (!onnxBackendAvailable) {
        log('Initializing ONNX models (first time ~77 MB download)...', 'warn');
        const ok = await initOnnxOCR((msg) => {
          $('progressText').textContent = msg;
        });
        if (!ok) throw new Error('ONNX initialization failed');
        onnxBackendAvailable = true;
      }

      const canvas = await renderPageToCanvas(page, OCR_SCALE);
      pageCanvases[p] = canvas;

      let borderData = { cells: [], lines: { horizontal: [], vertical: [] } };
      if (opencvReady) {
        borderData = await detectTableBorders(canvas);
      }

      currentOCRPage = p;

      try {
        const ocrResult = await ocrPageWithOnnx(canvas, p);
        ocrPageCount++;

        const pageWords = ocrResult.words;
        const pageOcrLines = ocrResult.lines;
        totalOcrWords += pageWords.length;
        const pageConf = pageWords.length > 0
          ? pageWords.reduce((s, w) => s + w.confidence, 0) / pageWords.length
          : 0;
        totalConfidence += pageConf * pageWords.length;

        log('  Page ' + p + ': ' + pageWords.length + ' OCR words, ' + pageOcrLines.length + ' lines (avg conf: ' + pageConf.toFixed(1) + '%)' , 'ok');
        allOcrWords.push(...pageWords);
        allOcrLines.push(...pageOcrLines);

        if (borderData && borderData.cells.length > 0) {
          allBorderCells.push(...borderData.cells.map(cell => ({
            x: cell.x / OCR_SCALE,
            y: cell.y / OCR_SCALE,
            width: cell.width / OCR_SCALE,
            height: cell.height / OCR_SCALE,
            area: cell.area / (OCR_SCALE * OCR_SCALE),
            page: p
          })));
        }
      } catch (error) {
        log('  Page ' + p + ': OCR error - ' + error.message, 'err');
        console.error('[OCR Error] Page ' + p + ':', error);
        continue;
      }
    }

    page.cleanup();
    pageTimings.push(performance.now() - pageStartTime);
  }

  // Pass 2: Table extraction
  $('pbar').style.width = '85%';
  $('progressText').textContent = 'Building table...';

  let rows;
  if (allOcrWords.length > 0) {
    log('OCR total: ' + allOcrWords.length + ' words across ' + ocrPageCount + ' pages', 'ok');
    if (allBorderCells.length > 0) {
      log('Border detection: ' + allBorderCells.length + ' cells detected', 'ok');
    }
    rows = await ocrTableExtract(allOcrLines, allOcrWords, allBorderCells, pageCanvases);
  } else if (allLines.length > 20) {
    log('Using LATTICE mode (lines detected)', 'ok');
    rows = await latticeExtract(allTextItems, allLines, numPages);
  } else {
    log('Using alternative table detection method...', 'ok');
    rows = await textClusterExtract(allTextItems);
  }

  $('pbar').style.width = '95%';
  extractedRows = rows;

  const dataRows = rows.filter(r => r.type === 'data').length;
  const sectionRows = rows.filter(r => r.type === 'section').length;
  const avgConf = totalOcrWords > 0 ? (totalConfidence / totalOcrWords).toFixed(1) : null;

  showStats({
    pages: numPages,
    rows: rows.length,
    dataRows,
    sectionRows
  });
  log('Extracted ' + rows.length + ' rows (' + dataRows + ' data, ' + sectionRows + ' sections)', 'ok');

  renderPreview(rows);
  $('pbar').style.width = '100%';
  setTimeout(() => $('progressPanel').classList.add('hidden'), 500);
}

// ── ETA Formatter ──
function formatETA(ms) {
  const totalSec = Math.round(ms / 1000);
  if (totalSec < 60) return totalSec + 's';
  const min = Math.floor(totalSec / 60);
  const sec = totalSec % 60;
  if (min < 60) return min + ' min ' + (sec > 0 ? sec + 's' : '');
  const hr = Math.floor(min / 60);
  return hr + 'h ' + (min % 60) + 'min';
}

// ── Init ──
setupExport();
log('Ready. Drop a PDF to begin.');

</script>
</body>
</html>
