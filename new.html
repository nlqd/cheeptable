<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BOQ PDF → Excel (Client-side POC)</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<style>
:root { --bg: #0f172a; --surface: #1e293b; --border: #334155; --accent: #3b82f6; --accent2: #10b981; --text: #e2e8f0; --dim: #94a3b8; --warn: #f59e0b; }
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace; background: var(--bg); color: var(--text); min-height:100vh; padding: 24px; }
h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
h1 span { color: var(--accent); }
.subtitle { color: var(--dim); font-size: 12px; margin-bottom: 24px; }
.subtitle em { color: var(--warn); font-style: normal; }

#dropzone {
  border: 2px dashed var(--border); border-radius: 12px; padding: 48px; text-align: center;
  cursor: pointer; transition: all 0.2s; position: relative; margin-bottom: 20px;
}
#dropzone:hover, #dropzone.dragover { border-color: var(--accent); background: rgba(59,130,246,0.05); }
#dropzone input { position:absolute; inset:0; opacity:0; cursor:pointer; }
#dropzone p { color: var(--dim); font-size: 14px; }
#dropzone p strong { color: var(--text); }

.panel { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; margin-bottom: 16px; }
.panel-title { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--dim); margin-bottom: 12px; }

.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; }
.stat { text-align: center; }
.stat .val { font-size: 24px; font-weight: 700; color: var(--accent); }
.stat .label { font-size: 11px; color: var(--dim); }

.log { font-size: 12px; color: var(--dim); max-height: 200px; overflow-y: auto; white-space: pre-wrap; line-height: 1.6; }
.log .ok { color: var(--accent2); }
.log .warn { color: var(--warn); }
.log .err { color: #ef4444; }

.table-wrap { max-height: 400px; overflow: auto; border-radius: 6px; border: 1px solid var(--border); }
table { border-collapse: collapse; width: 100%; font-size: 11px; }
th { background: var(--accent); color: white; padding: 6px 8px; position: sticky; top: 0; text-align: left; font-weight: 600; }
td { padding: 4px 8px; border-bottom: 1px solid var(--border); white-space: nowrap; }
tr:hover td { background: rgba(59,130,246,0.08); }
td.num { text-align: right; font-variant-numeric: tabular-nums; }
tr.section td { background: rgba(59,130,246,0.15); font-weight: 600; color: var(--accent); }

.actions { display: flex; gap: 12px; margin-top: 16px; }
button { background: var(--accent); color: white; border: none; padding: 10px 24px; border-radius: 6px; font-family: inherit; font-size: 13px; cursor: pointer; font-weight: 600; }
button:hover { filter: brightness(1.1); }
button.secondary { background: var(--accent2); }
button:disabled { opacity: 0.4; cursor: not-allowed; }

.progress { height: 4px; background: var(--border); border-radius: 2px; margin: 16px 0; overflow: hidden; }
.progress-bar { height: 100%; background: var(--accent); transition: width 0.3s; border-radius: 2px; }

.hidden { display: none !important; }
</style>
</head>
<body>

<h1>BOQ PDF → <span>Excel</span></h1>
<p class="subtitle">Client-side table extraction with OCR · <em>no server</em> · pdf.js + Tesseract.js + SheetJS</p>

<div id="dropzone">
  <input type="file" id="fileInput" accept=".pdf">
  <p><strong>Drop PDF here</strong> or click to browse</p>
</div>

<div id="progressPanel" class="hidden">
  <div class="progress"><div class="progress-bar" id="pbar" style="width:0%"></div></div>
</div>

<div id="statsPanel" class="panel hidden">
  <div class="panel-title">Extraction Stats</div>
  <div class="stats-grid" id="stats"></div>
</div>

<div id="logPanel" class="panel hidden">
  <div class="panel-title">Pipeline Log</div>
  <div class="log" id="log"></div>
</div>

<div id="previewPanel" class="panel hidden">
  <div class="panel-title">Table Preview <span id="previewCount"></span></div>
  <div class="table-wrap" id="tableWrap"></div>
  <div class="actions">
    <button id="dlXlsx" class="secondary" disabled>Download .xlsx</button>
    <button id="dlCsv" disabled>Download .csv</button>
  </div>
</div>

<script>
// ── Config ──
const LINE_TOLERANCE = 3;    // points: snap lines within this distance
const MIN_LINE_LEN = 10;     // ignore lines shorter than this
const CELL_PAD = 1.5;        // inset for text-in-cell matching
const OCR_SCALE = 400 / 72;  // render at 400 DPI for OCR (higher quality)

pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// ── State ──
let extractedRows = [];
let tesseractWorker = null;

// ── UI Refs ──
const $ = id => document.getElementById(id);
const dropzone = $('dropzone');
const fileInput = $('fileInput');
const logEl = $('log');

// ── Logging ──
function log(msg, cls = '') {
  $('logPanel').classList.remove('hidden');
  const span = document.createElement('span');
  span.className = cls;
  span.textContent = msg + '\n';
  logEl.appendChild(span);
  logEl.scrollTop = logEl.scrollHeight;
}

// ── File Input ──
dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('dragover'); });
dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
dropzone.addEventListener('drop', e => { e.preventDefault(); dropzone.classList.remove('dragover'); handleFile(e.dataTransfer.files[0]); });
fileInput.addEventListener('change', e => handleFile(e.target.files[0]));

async function handleFile(file) {
  if (!file || !file.name.endsWith('.pdf')) { log('Not a PDF file', 'err'); return; }
  log(`Loading: ${file.name} (${(file.size/1024).toFixed(0)} KB)`);
  $('progressPanel').classList.remove('hidden');

  const buf = await file.arrayBuffer();
  try {
    await extractPDF(buf);
  } catch (err) {
    log(`Fatal: ${err.message}`, 'err');
    console.error(err);
  }
}

// ── Core Pipeline ──
async function extractPDF(buffer) {
  const pdf = await pdfjsLib.getDocument({ data: buffer }).promise;
  const numPages = pdf.numPages;
  log(`PDF loaded: ${numPages} pages`, 'ok');

  let allTextItems = [];
  let allLines = [];
  let totalOps = 0;
  let allOcrWords = [];
  let allOcrLines = [];
  let ocrPageCount = 0;
  let totalConfidence = 0;
  let totalOcrWords = 0;

  for (let p = 1; p <= numPages; p++) {
    $('pbar').style.width = `${(p / numPages * 80)}%`;
    const page = await pdf.getPage(p);
    const vp = page.getViewport({ scale: 1.0 });
    const pageH = vp.height;

    const tc = await page.getTextContent();
    const pageText = tc.items.filter(it => it.str.trim()).map(it => ({
      str: it.str,
      x: it.transform[4],
      y: pageH - it.transform[5],
      width: it.width,
      height: Math.abs(it.transform[3]) || Math.abs(it.transform[0]) || 10,
      page: p
    }));

    if (pageText.length > 0) {
      // Text-based page: native extraction
      const opList = await page.getOperatorList();
      totalOps += opList.fnArray.length;
      const pageLines = extractLines(opList, pageH, p);
      log(`  Page ${p}: ${pageText.length} text spans, ${pageLines.length} lines (native)`);
      allTextItems.push(...pageText);
      allLines.push(...pageLines);
    } else {
      // Image-based page: OCR
      if (!tesseractWorker) {
        log('Initializing Tesseract OCR (Vietnamese)...', 'warn');
        tesseractWorker = await initTesseract();
        log('Tesseract ready', 'ok');
      }

      const canvas = await renderPageToCanvas(page, OCR_SCALE);
      const ocrResult = await ocrPage(canvas, p);
      ocrPageCount++;

      const pageWords = ocrResult.words;
      const pageOcrLines = ocrResult.lines;
      totalOcrWords += pageWords.length;
      const pageConf = pageWords.length > 0
        ? pageWords.reduce((s, w) => s + w.confidence, 0) / pageWords.length
        : 0;
      totalConfidence += pageConf * pageWords.length;

      log(`  Page ${p}: ${pageWords.length} OCR words, ${pageOcrLines.length} lines (avg conf: ${pageConf.toFixed(1)}%)`);
      allOcrWords.push(...pageWords);
      allOcrLines.push(...pageOcrLines);
    }

    page.cleanup();
  }

  // Pass 2: Table extraction
  $('pbar').style.width = '85%';

  let rows;
  if (allOcrWords.length > 0) {
    log(`OCR total: ${allOcrWords.length} words across ${ocrPageCount} pages`, 'ok');
    rows = ocrTableExtract(allOcrLines, allOcrWords);
  } else if (allLines.length > 20) {
    log('Using LATTICE mode (lines detected)', 'ok');
    rows = latticeExtract(allTextItems, allLines, numPages);
  } else {
    log('Few lines detected — falling back to TEXT CLUSTERING mode', 'warn');
    rows = textClusterExtract(allTextItems);
  }

  $('pbar').style.width = '95%';
  extractedRows = rows;

  const dataRows = rows.filter(r => r.type === 'data').length;
  const sectionRows = rows.filter(r => r.type === 'section').length;
  const avgConf = totalOcrWords > 0 ? (totalConfidence / totalOcrWords).toFixed(1) : null;

  showStats({
    pages: numPages,
    ocrWords: totalOcrWords,
    avgConfidence: avgConf,
    textSpans: allTextItems.length,
    lines: allLines.length,
    ops: totalOps,
    rows: rows.length,
    dataRows,
    sectionRows
  });
  log(`Extracted ${rows.length} rows (${dataRows} data, ${sectionRows} sections)`, 'ok');

  renderPreview(rows);
  $('pbar').style.width = '100%';
  setTimeout(() => $('progressPanel').classList.add('hidden'), 500);
}

// ── Tesseract OCR Functions ──
async function initTesseract() {
  const worker = await Tesseract.createWorker('vie+eng', 1, {
    logger: m => {
      if (m.status === 'recognizing text') {
        // Silent progress to avoid console spam
      }
    }
  });

  // Configure Tesseract for better Vietnamese recognition
  await worker.setParameters({
    tessedit_pageseg_mode: '3',  // Fully automatic page segmentation (no OSD)
    tessedit_ocr_engine_mode: '1', // Neural nets LSTM engine only
    preserve_interword_spaces: '1'
  });

  return worker;
}

async function renderPageToCanvas(page, scale) {
  const vp = page.getViewport({ scale });
  const canvas = document.createElement('canvas');
  canvas.width = vp.width;
  canvas.height = vp.height;
  const ctx = canvas.getContext('2d');

  // Render the page with high quality
  await page.render({ canvasContext: ctx, viewport: vp }).promise;

  // No preprocessing - Tesseract works better with original high-DPI images
  return canvas;
}

async function ocrPage(canvas, pageNum) {
  const { data } = await tesseractWorker.recognize(canvas);
  const s = OCR_SCALE;

  const words = data.words
    .filter(w => w.text.trim() && w.confidence > 30)
    .map(w => ({
      text: w.text.trim(),
      x: w.bbox.x0 / s,
      y: w.bbox.y0 / s,
      x1: w.bbox.x1 / s,
      y1: w.bbox.y1 / s,
      width: (w.bbox.x1 - w.bbox.x0) / s,
      height: (w.bbox.y1 - w.bbox.y0) / s,
      confidence: w.confidence,
      page: pageNum
    }));

  const lines = data.lines
    .filter(l => l.text.trim())
    .map(l => ({
      text: l.text.trim(),
      x: l.bbox.x0 / s,
      y: l.bbox.y0 / s,
      x1: l.bbox.x1 / s,
      y1: l.bbox.y1 / s,
      words: l.words.filter(w => w.text.trim()).map(w => ({
        text: w.text.trim(),
        x: w.bbox.x0 / s,
        y: w.bbox.y0 / s,
        x1: w.bbox.x1 / s,
        y1: w.bbox.y1 / s,
        confidence: w.confidence
      })),
      confidence: l.confidence,
      page: pageNum
    }));

  return { words, lines };
}

// ── Line Extraction from pdf.js Operator List ──
function extractLines(opList, pageH, pageNum) {
  const OPS = pdfjsLib.OPS;
  const lines = [];
  let cx = 0, cy = 0;

  for (let i = 0; i < opList.fnArray.length; i++) {
    const fn = opList.fnArray[i];
    const args = opList.argsArray[i];

    if (fn === OPS.constructPath) {
      const pathOps = args[0];
      const coords = args[1];
      let ci = 0, px = 0, py = 0;
      for (const op of pathOps) {
        if (op === 0) { // moveTo
          px = coords[ci++]; py = coords[ci++];
        } else if (op === 1) { // lineTo
          const nx = coords[ci++], ny = coords[ci++];
          const len = Math.hypot(nx - px, ny - py);
          if (len >= MIN_LINE_LEN) {
            lines.push({ x0: px, y0: pageH - py, x1: nx, y1: pageH - ny, page: pageNum });
          }
          px = nx; py = ny;
        } else if (op === 2) { ci += 6; } // curveTo: skip
        else if (op === 3) { /* closePath */ }
      }
    }

    if (fn === OPS.rectangle && args.length >= 4) {
      const [x, y, w, h] = args;
      // Rectangles produce 4 lines
      if (Math.abs(w) >= MIN_LINE_LEN) {
        lines.push({ x0: x, y0: pageH - y, x1: x + w, y1: pageH - y, page: pageNum });
        lines.push({ x0: x, y0: pageH - (y + h), x1: x + w, y1: pageH - (y + h), page: pageNum });
      }
      if (Math.abs(h) >= MIN_LINE_LEN) {
        lines.push({ x0: x, y0: pageH - y, x1: x, y1: pageH - (y + h), page: pageNum });
        lines.push({ x0: x + w, y0: pageH - y, x1: x + w, y1: pageH - (y + h), page: pageNum });
      }
    }

    // Individual path ops (some pdf.js versions)
    if (fn === OPS.moveTo) { cx = args[0]; cy = args[1]; }
    if (fn === OPS.lineTo) {
      const len = Math.hypot(args[0] - cx, args[1] - cy);
      if (len >= MIN_LINE_LEN) {
        lines.push({ x0: cx, y0: pageH - cy, x1: args[0], y1: pageH - args[1], page: pageNum });
      }
      cx = args[0]; cy = args[1];
    }
  }
  return lines;
}

// ── Lattice Table Extraction ──
function latticeExtract(textItems, lines, numPages) {
  const allRows = [];

  for (let p = 1; p <= numPages; p++) {
    const pageLines = lines.filter(l => l.page === p);
    const pageText = textItems.filter(t => t.page === p);
    if (pageLines.length < 4 || pageText.length === 0) continue;

    // Classify lines
    const hLines = [], vLines = [];
    for (const l of pageLines) {
      const dx = Math.abs(l.x1 - l.x0), dy = Math.abs(l.y1 - l.y0);
      if (dy < LINE_TOLERANCE && dx >= MIN_LINE_LEN)
        hLines.push({ y: (l.y0 + l.y1) / 2, xMin: Math.min(l.x0, l.x1), xMax: Math.max(l.x0, l.x1) });
      else if (dx < LINE_TOLERANCE && dy >= MIN_LINE_LEN)
        vLines.push({ x: (l.x0 + l.x1) / 2, yMin: Math.min(l.y0, l.y1), yMax: Math.max(l.y0, l.y1) });
    }

    const ys = cluster(hLines.map(l => l.y));
    const xs = cluster(vLines.map(l => l.x));

    if (xs.length < 2 || ys.length < 2) {
      log(`  Page ${p}: Grid too sparse (${xs.length} cols, ${ys.length} rows) — skipping lattice`, 'warn');
      continue;
    }

    log(`  Page ${p}: Grid ${ys.length - 1} rows × ${xs.length - 1} cols`);

    // Build cells
    for (let r = 0; r < ys.length - 1; r++) {
      const rowCells = [];
      const yTop = ys[r], yBot = ys[r + 1];

      for (let c = 0; c < xs.length - 1; c++) {
        const xL = xs[c] + CELL_PAD, xR = xs[c + 1] - CELL_PAD;
        const cellText = pageText.filter(t => {
          const tcx = t.x + t.width / 2;
          const tcy = t.y;
          return tcx >= xL && tcx <= xR && tcy >= yTop + CELL_PAD && tcy <= yBot - CELL_PAD;
        });
        cellText.sort((a, b) => a.y - b.y || a.x - b.x);
        rowCells.push(cellText.map(t => t.str).join(' ').trim());
      }

      // Skip empty rows
      if (rowCells.every(c => c === '')) continue;

      // Classify row
      const nonEmpty = rowCells.filter(c => c !== '').length;
      const firstCell = rowCells[0] || '';
      const isSection = (nonEmpty <= 2 && rowCells.slice(1).some(c => c.length > 15)) ||
                        (rowCells.join(' ').match(/^(PHẦN|TÁI LẬP|Thủy lượng|ĐƯỜNG|\d+\.\s*ĐƯỜNG)/i));
      const isHeader = firstCell.match(/^(Stt|\(1\))/i);

      if (isHeader) continue; // skip repeated headers

      allRows.push({
        type: isSection ? 'section' : 'data',
        cells: rowCells,
        page: p
      });
    }
  }

  return allRows;
}

// ── Fallback: Text Clustering ──
function textClusterExtract(textItems) {
  log('Text clustering: grouping by Y coordinate...', 'warn');
  const rows = [];

  // Group by page, then by Y clusters
  const byPage = {};
  textItems.forEach(t => { (byPage[t.page] = byPage[t.page] || []).push(t); });

  for (const [page, items] of Object.entries(byPage)) {
    const yVals = cluster(items.map(t => t.y), 4);

    for (let i = 0; i < yVals.length - 1; i++) {
      const yTop = yVals[i], yBot = (i < yVals.length - 1) ? yVals[i + 1] : yTop + 20;
      const rowItems = items.filter(t => t.y >= yTop - 2 && t.y < yBot - 2);
      if (rowItems.length === 0) continue;

      rowItems.sort((a, b) => a.x - b.x);
      const text = rowItems.map(t => t.str).join(' ').trim();
      if (!text) continue;

      rows.push({ type: 'data', cells: [text], page: +page });
    }
  }
  return rows;
}

// ── OCR Table Extraction ──
function ocrTableExtract(ocrLines, ocrWords) {
  // Filter margin content (headers/footers in top/bottom 5%)
  const pageHeights = {};
  ocrWords.forEach(w => {
    pageHeights[w.page] = Math.max(pageHeights[w.page] || 0, w.y1);
  });

  const filteredLines = ocrLines.filter(l => {
    const ph = pageHeights[l.page] || 800;
    return l.y > ph * 0.05 && l.y1 < ph * 0.95;
  });

  // Check if pipe characters are prevalent (table borders recognized as |)
  const pipeCount = filteredLines.filter(l => (l.text.match(/[|\[\]]/g) || []).length >= 2).length;
  const pipeRatio = pipeCount / filteredLines.length;
  log(`  Pipe-delimited lines: ${pipeCount}/${filteredLines.length} (${(pipeRatio * 100).toFixed(0)}%)`);

  if (pipeRatio > 0.25) {
    log('Using PIPE-BASED parsing (table borders detected in OCR)', 'ok');
    return pipeBasedExtract(filteredLines);
  }

  // Fallback: spatial word-position analysis
  log('Using SPATIAL parsing (word positions)', 'ok');
  const filteredWords = ocrWords.filter(w => {
    const ph = pageHeights[w.page] || 800;
    return w.y > ph * 0.05 && w.y1 < ph * 0.95;
  });
  return spatialExtract(filteredLines, filteredWords);
}

// ── Pipe-based extraction (scanned tables with visible borders) ──
function pipeBasedExtract(ocrLines) {
  var rawRows = [];

  for (var li = 0; li < ocrLines.length; li++) {
    var line = ocrLines[li];
    var text = line.text;

    // Normalize bracket-like chars that Tesseract uses for |
    var normalized = text.replace(/[\[\]]/g, '|');
    var parts = normalized.split('|').map(function(p) { return p.trim(); });
    while (parts.length > 0 && parts[0] === '') parts.shift();
    while (parts.length > 0 && parts[parts.length - 1] === '') parts.pop();

    if (parts.length === 0) continue;

    rawRows.push({ parts: parts, page: line.page, text: text });
  }

  var TARGET_COLS = 6;
  var rows = [];

  for (var ri = 0; ri < rawRows.length; ri++) {
    var raw = rawRows[ri];
    var cells = assignToColumns(raw.parts);
    if (!cells) continue;

    var rowType = classifyRow(cells, TARGET_COLS);
    if (rowType === 'header') continue;
    rows.push({ type: rowType, cells: cells, page: raw.page });
  }

  log('  Pipe parsing: ' + rows.length + ' rows before merge');
  return mergeMultiLineCells(rows, TARGET_COLS);
}

// Recognize Vietnamese units, including OCR-garbled variants
function matchUnit(s) {
  s = s.trim();
  // Clean common OCR substitutions before matching
  var cleaned = s.replace(/[Jj][lI1]/g, '').replace(/^[0-9]+\s*/, '');
  // Direct unit match
  if (/^(m[23]|md|kg|tấn|cái|bộ|lít|Bộ|ci|cil|hộp|con|chiếc|thanh|sợi|cuộn|bao|gói)$/i.test(s)) return true;
  // "100m3", "100m2", "1900m", etc. (number prefix + unit)
  if (/^\d+\s*m[23]?$/i.test(s)) return true;
  // OCR-garbled: "Ji99m3" → "100m3", "Jl00m3" → "100m3"
  if (/^[Jj][lI1i]\d{2}m[23]?$/i.test(s)) return true;
  return false;
}

// Map pipe-split parts into 6 columns: [STT, desc, unit, qty, price, total]
function assignToColumns(parts) {
  var cells = ['', '', '', '', '', ''];
  if (parts.length === 0) return null;

  // Find the unit part (key anchor) — search from right to left
  var unitIdx = -1;
  for (var i = parts.length - 1; i >= 0; i--) {
    if (matchUnit(parts[i])) { unitIdx = i; break; }
  }

  // Also check if a unit is embedded at the END of a text part: "...Đấtcấp3 m3"
  if (unitIdx === -1) {
    for (var i = 0; i < parts.length; i++) {
      var m = parts[i].match(/\s+(m[23]|100\s*m[23]|kg|tấn|md|Bộ|ci)\s*$/i);
      if (m) {
        // Split the part: text before unit becomes desc, matched unit becomes unit
        var beforeUnit = parts[i].substring(0, parts[i].length - m[0].length).trim();
        var unitText = m[1];
        parts.splice(i, 1, beforeUnit, unitText);
        unitIdx = i + 1;
        break;
      }
    }
  }

  if (unitIdx >= 0 && unitIdx < parts.length - 1) {
    var descParts = parts.slice(0, unitIdx);
    var unit = parts[unitIdx];
    var numParts = parts.slice(unitIdx + 1);

    // Extract STT from desc parts
    var stt = '';
    if (descParts.length > 0) {
      var firstPart = descParts[0].trim();
      if (/^\d{1,3}$/.test(firstPart) && descParts.length > 1) {
        // STT is in its own pipe section
        stt = firstPart;
        descParts.shift();
      } else if (/^\d{1,3}$/.test(firstPart) && descParts.length === 1) {
        // Only a number, no description — STT only
        stt = firstPart;
        descParts[0] = '';
      } else {
        var sttMatch = firstPart.match(/^(\d{1,3})\s+(.*)/);
        if (sttMatch) { stt = sttMatch[1]; descParts[0] = sttMatch[2]; }
      }
    }

    cells[0] = stt;
    cells[1] = descParts.join(' ').trim();
    cells[2] = unit;

    // Collect all numbers from remaining parts
    var nums = [];
    for (var j = 0; j < numParts.length; j++) {
      var cleaned = numParts[j].replace(/[())\]\\{}]/g, '').trim();
      if (!cleaned) continue;
      var subNums = cleaned.split(/\s+/).filter(function(s) { return /[\d]/.test(s); });
      nums.push.apply(nums, subNums);
    }

    if (nums.length >= 3) { cells[3] = nums[0]; cells[4] = nums[1]; cells[5] = nums[2]; }
    else if (nums.length === 2) { cells[3] = nums[0]; cells[5] = nums[1]; }
    else if (nums.length === 1) { cells[3] = nums[0]; }

  } else {
    // No unit found — try to salvage
    var fullText = parts.join(' ').trim();
    if (!fullText) return null;

    // Check for trailing numbers pattern: "description ... num num num"
    var trailingNums = fullText.match(/^(.+?)\s+([\d.,]+)\s+([\d.,]+)\s+([\d.,]+)\s*$/);
    if (trailingNums) {
      cells[1] = trailingNums[1];
      cells[3] = trailingNums[2]; cells[4] = trailingNums[3]; cells[5] = trailingNums[4];
    } else if (parts.length >= 3) {
      // Multiple pipe parts but no unit — last parts might be numbers
      var lastParts = parts.slice(-3);
      var numericLast = lastParts.filter(function(p) { return /^[\d.,\-—()\s]+$/.test(p); }).length;
      if (numericLast >= 2) {
        var descEnd = parts.length - numericLast;
        cells[1] = parts.slice(0, descEnd).join(' ').trim();
        var numArr = parts.slice(descEnd);
        for (var k = 0; k < numArr.length && k < 3; k++) {
          cells[3 + k] = numArr[k].replace(/[()]/g, '').trim();
        }
      } else {
        cells[1] = fullText;
      }
    } else {
      // Pure text row — extract STT if present
      var sttMatch2 = fullText.match(/^[\(\[]?(\d{1,3})[\)\]]?\s+(.*)/);
      if (sttMatch2) { cells[0] = sttMatch2[1]; cells[1] = sttMatch2[2]; }
      else { cells[1] = fullText; }
    }
  }

  // Final pass: extract STT from description if not already set
  if (!cells[0] && cells[1]) {
    var sttFinal = cells[1].match(/^[\(\[]?(\d{1,3})[\)\]]?\s+(.*)/);
    if (sttFinal) { cells[0] = sttFinal[1]; cells[1] = sttFinal[2]; }
  }

  // Clean OCR artifacts in numeric columns
  for (var c = 3; c < 6; c++) {
    if (cells[c]) {
      cells[c] = cells[c].replace(/O/g, '0').replace(/[lI]/g, '1').replace(/[$#]/g, '').replace(/\s/g, '');
    }
  }

  return cells;
}

// ── Spatial extraction fallback (for cleaner OCR without pipe borders) ──
function spatialExtract(filteredLines, filteredWords) {
  var colBoundaries = detectColumns(filteredWords, filteredLines);
  var numCols = colBoundaries.length - 1;
  log('  Column detection: ' + numCols + ' columns (spatial)');

  if (numCols < 2) {
    return filteredLines.map(function(l) { return { type: 'data', cells: [l.text], page: l.page }; });
  }

  var rows = [];
  for (var li = 0; li < filteredLines.length; li++) {
    var line = filteredLines[li];
    var cells = new Array(numCols).fill('');

    for (var wi = 0; wi < line.words.length; wi++) {
      var word = line.words[wi];
      var cx = (word.x + word.x1) / 2;
      var colIdx = findColumn(cx, colBoundaries);
      if (colIdx >= 0 && colIdx < numCols) {
        cells[colIdx] = cells[colIdx] ? cells[colIdx] + ' ' + word.text : word.text;
      }
    }

    if (cells.every(function(c) { return c === ''; })) continue;

    for (var c = 3; c < numCols; c++) {
      if (cells[c]) cells[c] = cells[c].replace(/O/g, '0').replace(/l/g, '1').replace(/\s/g, '');
    }

    rows.push({ type: classifyRow(cells, numCols), cells: cells, page: line.page });
  }

  return mergeMultiLineCells(rows, numCols);
}

function detectColumns(words, lines) {
  // Strategy 1: Header anchoring
  for (var i = 0; i < lines.length; i++) {
    var lineText = lines[i].text.toLowerCase();
    if ((/stt|\(1\)/).test(lineText) && (/mô\s*tả|công\s*việc|[đd]vt|đơn\s*vị/).test(lineText)) {
      log('  Header found: "' + lines[i].text.substring(0, 60) + '..."', 'ok');
      var sortedWords = lines[i].words.slice().sort(function(a, b) { return a.x - b.x; });
      if (sortedWords.length >= 4) {
        var boundaries = [sortedWords[0].x - 5];
        for (var j = 0; j < sortedWords.length - 1; j++) {
          if (sortedWords[j + 1].x - sortedWords[j].x1 > 10) {
            boundaries.push((sortedWords[j].x1 + sortedWords[j + 1].x) / 2);
          }
        }
        boundaries.push(sortedWords[sortedWords.length - 1].x1 + 20);
        if (boundaries.length >= 5) return boundaries;
      }
    }
  }

  log('  Header not found, using x-histogram gap detection', 'warn');
  return detectColumnsHistogram(words);
}

function detectColumnsHistogram(words) {
  var BIN_SIZE = 5;
  var maxX = Math.max.apply(null, words.map(function(w) { return w.x1; }));
  var bins = new Array(Math.ceil(maxX / BIN_SIZE) + 1).fill(0);

  words.forEach(function(w) {
    var bin = Math.floor(w.x / BIN_SIZE);
    if (bin >= 0 && bin < bins.length) bins[bin]++;
  });

  var threshold = Math.max.apply(null, bins) * 0.02;
  var gaps = [];
  var inGap = false, gapStart = 0;

  for (var i = 0; i < bins.length; i++) {
    if (bins[i] <= threshold) {
      if (!inGap) { inGap = true; gapStart = i; }
    } else {
      if (inGap && (i - gapStart) >= 2) gaps.push((gapStart + i) / 2 * BIN_SIZE);
      inGap = false;
    }
  }

  var leftEdge = Math.min.apply(null, words.map(function(w) { return w.x; })) - 5;
  var rightEdge = maxX + 20;
  var boundaries = [leftEdge].concat(gaps, [rightEdge]).sort(function(a, b) { return a - b; });

  log('  Column boundaries (histogram): [' + boundaries.map(function(b) { return b.toFixed(0); }).join(', ') + ']');
  return boundaries;
}

function findColumn(x, boundaries) {
  for (var i = 0; i < boundaries.length - 1; i++) {
    if (x >= boundaries[i] && x < boundaries[i + 1]) return i;
  }
  return boundaries.length - 2;
}

function classifyRow(cells, numCols) {
  var stt = cells[0] || '';
  var desc = cells[1] || '';
  var unit = cells[2] || '';
  var nonEmpty = cells.filter(function(c) { return c !== ''; }).length;
  var hasNumericData = cells.slice(3).some(function(c) { return c && /[\d]/.test(c); });

  // Header patterns (column headers)
  if (/^stt$/i.test(stt) || /^\(1\)$/.test(stt)) return 'header';
  if (/^stt$/i.test(desc) || /HÀNG\s*MỤC|MÔ\s*TẢ/i.test(desc)) return 'header';

  // Pre-table content (document titles, metadata) — matches both diacritics and without
  if (/CỘNG\s*H[OÒÕ]À|Độc\s*lập|BI[ÊE]U\s*GI[AÁ]|Đính\s*kèm|dự\s*án|Hợp\s*đồng\s*số|thầu/i.test(desc)) return 'header';
  if (/^đồng\s+đồng$/i.test(desc.trim())) return 'header';
  // Street/area section headers
  if (/H[ÊEẺ]M\s*\d+|CONG\s*TR[ƯU][ỜO]NG\s*QU[ỐO]C/i.test(desc) && !hasNumericData) return 'section';
  // "ĐƯỜNG NGUYỄN ĐÌNH CHIỂU" / "LDUONGNGUYENDINH" — street name headers
  if (/^L?[ĐD]?[ƯU]?[ỜO]?NG\s*NGUY[ÊE]N|PH[ƯU][ỜO]NG\s*[A-Z]/i.test(desc) && !hasNumericData) return 'section';
  // Broad: all-caps sections starting with PHAN (PHẦN)
  if (/^PH[AÀẢ]N\s*(T[AÁ]I|L[AÁ]P|[ĐD][ÀA]O)/i.test(desc)) return 'section';

  // Garbage detection: high ratio of non-alphanumeric chars → skip
  var alphaNum = (desc.match(/[a-zA-ZÀ-ỹ0-9\s.,()]/g) || []).length;
  var garbageRatio = 1 - (alphaNum / (desc.length || 1));

  // Skip garbled text-only rows (no unit, no numbers, lots of garbage)
  if (!unit && !hasNumericData && desc.length > 15 && garbageRatio > 0.25) return 'header';
  // Short garbled fragments with no data
  if (!unit && !hasNumericData && desc.length < 15 && nonEmpty <= 2) return 'header';
  // Long text-only rows with no structure — likely garbled OCR noise
  if (!unit && !hasNumericData && !stt && desc.length > 40) return 'header';

  // Section headers: clear Vietnamese section patterns only
  if (/PHẦN\s*(LẮP|ĐẶT|TÁI|ĐÀO)/i.test(desc) && !hasNumericData) return 'section';
  if (/^\d+\.\s*ĐƯỜNG/i.test(desc) && !hasNumericData) return 'section';
  if (/TÁI\s*LẬP\s*MẶT\s*ĐƯỜNG/i.test(desc) && !hasNumericData) return 'section';
  if (/ĐƯỜNG.*PHƯỜNG/i.test(desc) && !hasNumericData) return 'section';
  if (/TÁI\s*LẬP\s*(GẠCH|LÈ)/i.test(desc) && !hasNumericData) return 'section';

  // Data rows should have at least a unit or some numbers
  if (!unit && !hasNumericData && !stt) {
    // Text only, no structure — might be garbled section or noise
    if (desc.length > 40) return 'header';
    return 'data';
  }

  return 'data';
}

function mergeMultiLineCells(rows, numCols) {
  var merged = [];

  for (var i = 0; i < rows.length; i++) {
    var row = rows[i];
    if (row.type === 'header') continue;

    var stt = (row.cells[0] || '').trim();
    var desc = row.cells[1] || '';
    var hasSTT = /^\d{1,3}$/.test(stt);
    var hasUnit = row.cells[2] && row.cells[2].trim();
    var hasNumeric = row.cells.slice(3).some(function(c) { return c && /\d/.test(c); });

    // A continuation line: no STT, no unit, no numeric data, short desc, and previous row exists
    var isContLine = !hasSTT && !hasUnit && !hasNumeric && desc.length < 120;
    // Don't merge section rows
    if (row.type === 'section') isContLine = false;

    if (isContLine && merged.length > 0 && merged[merged.length - 1].type === 'data') {
      var prev = merged[merged.length - 1];
      // Only merge if it looks like a genuine continuation (same page, desc is reasonable)
      if (row.page === prev.page && desc.length < 80) {
        prev.cells[1] = (prev.cells[1] + ' ' + desc).trim();
        for (var c = 2; c < numCols; c++) {
          if (row.cells[c] && !prev.cells[c]) prev.cells[c] = row.cells[c];
        }
        continue;
      }
    }

    merged.push({ type: row.type, cells: row.cells.slice(), page: row.page });
  }

  return merged;
}

// ── Utilities ──
function cluster(values, tol = LINE_TOLERANCE) {
  if (values.length === 0) return [];
  const sorted = [...new Set(values.map(v => Math.round(v * 10) / 10))].sort((a, b) => a - b);
  const clusters = [sorted[0]];
  for (let i = 1; i < sorted.length; i++) {
    if (sorted[i] - clusters[clusters.length - 1] > tol) {
      clusters.push(sorted[i]);
    } else {
      // Update cluster center to average
      clusters[clusters.length - 1] = (clusters[clusters.length - 1] + sorted[i]) / 2;
    }
  }
  return clusters;
}

// ── UI: Stats ──
function showStats(s) {
  $('statsPanel').classList.remove('hidden');
  const items = [
    ['Pages', s.pages],
    ...(s.ocrWords > 0 ? [
      ['OCR Words', s.ocrWords],
      ['Avg Confidence', s.avgConfidence ? s.avgConfidence + '%' : 'N/A'],
    ] : [
      ['Text Spans', s.textSpans],
      ['Lines Found', s.lines],
    ]),
    ['Table Rows', s.rows],
    ['Data Rows', s.dataRows],
    ['Sections', s.sectionRows]
  ];
  $('stats').innerHTML = items
    .map(([l, v]) => `<div class="stat"><div class="val">${typeof v === 'number' ? v.toLocaleString() : v}</div><div class="label">${l}</div></div>`)
    .join('');
}

// ── UI: Table Preview ──
function renderPreview(rows) {
  $('previewPanel').classList.remove('hidden');
  $('previewCount').textContent = `(${rows.length} rows)`;

  // Determine max columns
  const maxCols = Math.max(...rows.map(r => r.cells.length), 1);
  const colHeaders = maxCols === 6
    ? ['STT', 'Mô tả công việc', 'Đvt', 'Khối lượng', 'Đơn giá', 'Thành tiền']
    : Array.from({ length: maxCols }, (_, i) => `Col ${i + 1}`);

  let html = '<table><thead><tr>';
  html += '<th>#</th>';
  colHeaders.forEach(h => html += `<th>${h}</th>`);
  html += '</tr></thead><tbody>';

  const previewRows = rows.slice(0, 200);
  previewRows.forEach((row, idx) => {
    const cls = row.type === 'section' ? ' class="section"' : '';
    html += `<tr${cls}>`;
    html += `<td style="color:var(--dim)">${idx + 1}</td>`;
    for (let c = 0; c < maxCols; c++) {
      const val = (row.cells[c] || '');
      const isNum = val.match(/^[\d.,]+$/) && c >= 3;
      html += `<td${isNum ? ' class="num"' : ''}>${escHtml(val)}</td>`;
    }
    html += '</tr>';
  });
  if (rows.length > 200) {
    html += `<tr><td colspan="${maxCols + 1}" style="text-align:center;color:var(--dim)">... ${rows.length - 200} more rows</td></tr>`;
  }
  html += '</tbody></table>';
  $('tableWrap').innerHTML = html;

  $('dlXlsx').disabled = false;
  $('dlCsv').disabled = false;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Export: XLSX ──
$('dlXlsx').addEventListener('click', () => {
  if (extractedRows.length === 0) return;
  const maxCols = Math.max(...extractedRows.map(r => r.cells.length));
  const headers = maxCols === 6
    ? ['STT', 'Mô tả công việc', 'Đvt', 'Khối lượng', 'Đơn giá (đồng)', 'Thành tiền (đồng)']
    : Array.from({ length: maxCols }, (_, i) => `Column ${i + 1}`);

  const aoa = [headers];
  for (const row of extractedRows) {
    const cells = [];
    for (let c = 0; c < maxCols; c++) {
      let val = row.cells[c] || '';
      // Try parsing numbers for numeric columns
      if (c >= 3 && val) {
        const parsed = parseVnNumber(val);
        if (parsed !== null) { cells.push(parsed); continue; }
      }
      // STT column
      if (c === 0 && val && /^\d+$/.test(val)) { cells.push(parseInt(val)); continue; }
      cells.push(val);
    }
    aoa.push(cells);
  }

  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.aoa_to_sheet(aoa);

  // Column widths
  ws['!cols'] = [
    { wch: 6 }, { wch: 60 }, { wch: 10 }, { wch: 14 }, { wch: 16 }, { wch: 18 }
  ].slice(0, maxCols);

  XLSX.utils.book_append_sheet(wb, ws, 'Biểu giá');
  XLSX.writeFile(wb, 'bieu_gia_extracted.xlsx');
  log('XLSX exported!', 'ok');
});

// ── Export: CSV ──
$('dlCsv').addEventListener('click', () => {
  if (extractedRows.length === 0) return;
  const maxCols = Math.max(...extractedRows.map(r => r.cells.length));
  let csv = '';
  for (const row of extractedRows) {
    const cells = [];
    for (let c = 0; c < maxCols; c++) {
      let val = row.cells[c] || '';
      if (val.includes(',') || val.includes('"') || val.includes('\n'))
        val = '"' + val.replace(/"/g, '""') + '"';
      cells.push(val);
    }
    csv += cells.join(',') + '\n';
  }
  downloadBlob(csv, 'bieu_gia_extracted.csv', 'text/csv;charset=utf-8;');
  log('CSV exported!', 'ok');
});

function downloadBlob(content, filename, mime) {
  const blob = new Blob(['\ufeff' + content], { type: mime });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}

// ── Vietnamese Number Parser ──
function parseVnNumber(s) {
  s = s.trim();
  if (!s || !/[\d]/.test(s)) return null;

  // "4.330.000" → 4330000 (dots as thousands)
  // "0,700" → 0.7 (comma as decimal)
  const dotCount = (s.match(/\./g) || []).length;
  const commaCount = (s.match(/,/g) || []).length;

  let normalized;
  if (dotCount > 1) {
    // Multiple dots = thousands separator
    normalized = s.replace(/\./g, '');
    if (commaCount === 1) normalized = normalized.replace(',', '.');
  } else if (dotCount === 1 && commaCount === 0) {
    // Could be decimal or thousands — check position
    const parts = s.split('.');
    if (parts[1] && parts[1].length === 3 && parts[0].length <= 3) {
      // Likely thousands separator: "1.000" = 1000
      normalized = s.replace('.', '');
    } else {
      normalized = s; // decimal
    }
  } else if (commaCount === 1 && dotCount === 0) {
    normalized = s.replace(',', '.');
  } else {
    normalized = s.replace(/\./g, '').replace(',', '.');
  }

  const num = parseFloat(normalized);
  return isNaN(num) ? null : num;
}

// ── Init message ──
log('Ready. Drop a BOQ PDF to begin.');
log('Pipeline: pdf.js (text + vectors) → Tesseract.js OCR fallback → table extraction → SheetJS export');
log('No data leaves your browser.\n');

// ── Cleanup ──
window.addEventListener('beforeunload', () => {
  if (tesseractWorker) tesseractWorker.terminate();
});
</script>
